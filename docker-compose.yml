services:

  # ========================
  #     MQTT (Mosquitto)
  # ========================
  mqtt:
    image: eclipse-mosquitto
    container_name: d_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # ========================
  #     NODE-RED
  # ========================
  nodered:
    image: nodered/node-red
    container_name: d_nodered
    restart: unless-stopped
    ports:
      - "8082:1880"
    volumes:
      - ./nodered:/data
    environment:
      - TZ=America/Sao_Paulo

  # ========================
  #     INFLUXDB 2.x
  # ========================
  influxdb:
    image: influxdb:2
    container_name: d_influxdb
    restart: unless-stopped
    ports:
      - "8083:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: FATEC
      DOCKER_INFLUXDB_INIT_BUCKET: FATEC
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "Ju-y99EX_FWketmNuXTQKUAS75mfxf0BI7XUXgYxTenjrHX7zNRMTJlkwhwEgUyATF23EG0G7A1pTHyitLOIVQ=="
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ========================
  #     GRAFANA
  # ========================
  grafana:
    image: grafana/grafana
    container_name: d_grafana
    restart: unless-stopped
    ports:
      - "8084:3000"
    volumes:
      - grafana-data:/var/lib/grafana

  # ========================
  #     BACKEND (API REST)
  # ========================
  backend:
    build: ./backend
    container_name: d_backend
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # InfluxDB connection (internal Docker network name)
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: "Ju-y99EX_FWketmNuXTQKUAS75mfxf0BI7XUXgYxTenjrHX7zNRMTJlkwhwEgUyATF23EG0G7A1pTHyitLOIVQ=="
      INFLUX_ORG: FATEC
      INFLUX_BUCKET: FATEC
      INFLUX_MEASUREMENT: sensores
    depends_on:
      influxdb:
        condition: service_healthy

# ========================
#     VOLUMES
# ========================
volumes:
  influxdb-data:
  grafana-data:
