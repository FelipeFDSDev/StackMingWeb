services:

  # ========================
  #     MQTT
  # ========================
  mqtt:
    image: eclipse-mosquitto
    container_name: d_mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # ========================
  #     NODE-RED
  # ========================
  nodered:
    image: nodered/node-red
    container_name: d_nodered
    ports:
      - "8082:1880"
    volumes:
      - ./nodered:/data

  # ========================
  #     INFLUXDB
  # ========================
  influxdb:
    image: influxdb:2
    container_name: d_influxdb
    restart: unless-stopped
    ports:
      - "8083:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  #     GRAFANA
  # ========================
  grafana:
    image: grafana/grafana
    container_name: d_grafana
    ports:
      - "8084:3000"
    volumes:
      - grafana-data:/var/lib/grafana

  # ========================
  #     BACKEND (CORRIGIDO)
  # ========================
  backend:
    build: ./backend
    container_name: d_backend
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      NODE_ENV: development
      PORT: 3000

      # ========================
      # MYSQL
      # ========================
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: iot_consolidated
      MYSQL_USER: iot_user
      MYSQL_PASSWORD: iot_pass

      # ========================
      # INFLUXDB (CORRETO)
      # ========================
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: Ju-y99EX_FWketmNuXTQKUAS75mfxf0BI7XUXgYxTenjrHX7zNRMTJlkwhwEgUyATF23EG0G7A1pTHyitLOIVQ==
      INFLUX_ORG: FATEC
      INFLUX_BUCKET: fatec

      # ========================
      # PIPELINE
      # ========================
      CONSOLIDATION_CRON: "*/30 * * * * *"
      CONSOLIDATION_WINDOW_MINUTES: 5

      # 🔥 IMPORTANTE: DESATIVADO MOCK
      USE_MOCK: "false"

    depends_on:
      mysql:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  # ========================
  #     FRONTEND
  # ========================
  frontend:
    build: ./frontend
    container_name: d_frontend
    ports:
      - "80:80"

  # ========================
  #     MYSQL
  # ========================
  mysql:
    image: mysql:8.4
    container_name: d_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: iot_consolidated
      MYSQL_USER: iot_user
      MYSQL_PASSWORD: iot_pass
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

# ========================
#     VOLUMES
# ========================
volumes:
  influxdb-data:
  grafana-data:
  mysql-data: